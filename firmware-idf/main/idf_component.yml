## DesktopWallE IDF spike component manifest.
##
## esp-sr is provided as a local EXTRA_COMPONENT_DIR by the root
## CMakeLists.txt (see ESP_SR_PATH override). Only the small registry
## components are managed here.
dependencies:
  idf: ">=5.5,<5.6"
  espressif/esp-dsp: "^1.8"
  espressif/dl_fft: ">=0.2"
  # ES7210 (mic ADC) + AW88298 (speaker amp) abstraction. Pulls the
  # ES7210 driver + I2S audio data interface in one package. CoreS3
  # has both chips on the I2C bus at the default addresses.
  espressif/esp_websocket_client: "^1.4"
  espressif/esp_codec_dev: "~1.5.4"
  # ILI9341/ILI9342C panel driver (CoreS3 uses 9342C; the 9341 driver
  # speaks the same SPI command set).
  espressif/esp_lcd_ili9341: "~1.2"
  # Opus encoder/decoder (we only use decoder for TTS) + container fmts.
  # Same package xiaozhi-esp32 uses. Decodes ~30-byte opus frames into
  # 16 kHz mono int16 PCM in well under realtime on ESP32-S3.
  espressif/esp_audio_codec: "~2.4.1"
